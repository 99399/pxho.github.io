<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>めじこんさば</title>
    <style>
        /* 全体の背景や文字の色を設定 */
        body {
            background-color: #1a1a1a; /* ダークモード風の黒 */
            color: #ffffff;           /* 文字は白 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;         /* スマホのスクロール問題対策 */
            padding: 20px;             /* 端に寄りすぎないように余白を追加 */
            box-sizing: border-box;
            margin: 0;
        }

        /* 見出しのデザイン */
        h1 {
            font-size: 2rem;           /* スマホに合わせたサイズ */
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-align: center;
        }

        /* 説明文のデザイン */
        p {
            color: #aaaaaa;
            font-size: 0.85rem;        /* 文字を小さくしてスッキリ配置 */
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;          /* 行間を広げて読みやすく */
        }

        /* Discordボタンのデザイン */
        .discord-btn {
            background-color: #5865F2; /* Discordのブランドカラー */
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            text-align: center;
        }

        /* ボタンにマウスを乗せたときの動き */
        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        /* PC用のサイズ微調整（画面幅が600px以上の場合） */
        @media (min-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- タイトルを追加してみました -->
    <h1>めじこんさば</h1>

    <!-- 小さくスッキリさせた説明文 -->
    <p>めじこんさばのさいとらしいよ<br>これからなにかつくるかもわら</p>

    <!-- Discordボタン -->
    <a href="https://discord.gg/medicon" target="_blank" class="discord-btn">
        めじこんさばにはいる
    </a>

</body>
</html>
